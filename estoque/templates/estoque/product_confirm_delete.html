{% extends 'estoque/base.html' %}

{% block title %}Excluir Produto - EstoquePro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="glass-card text-center mt-5" style="border-top: 4px solid #ef4444;">
            <div class="mb-4">
                <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
            </div>
            <h3 class="fw-bold mb-3">Excluir Produto</h3>
            <p class="text-secondary fs-5 mb-4">Tem certeza que deseja excluir o produto <strong class="text-white">"{{ object.name }}"</strong>?</p>
            <p class="text-danger small mb-4">Esta ação não pode ser desfeita.</p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3">
                    <a href="{% url 'product_list' %}" class="btn btn-outline-secondary px-4">Cancelar</a>
                    <button type="submit" class="btn btn-danger px-4 fw-bold">Sim, Excluir</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
